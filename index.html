<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista zadań</title>
    <!-- Premium fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <main class="app">
        <header class="app-head">
            <div class="brand">
                <h1>Moja lista zadań</h1>
                <p class="subtitle">Prosta, szybka i piękna lista — gotowa do wysłania do klienta</p>
            </div>
        </header>

        <section class="card">
            <ul id="task-list" aria-live="polite"></ul>

            <form id="task-form" class="task-bar" role="search">
                <input type="text" id="task-input" placeholder="Dodaj zadanie..." aria-label="Nowe zadanie">
                <button type="submit" class="btn-primary">Dodaj</button>
            </form>

            <p id="counter" class="counter" aria-hidden="true"></p>
        </section>

        <footer class="app-foot">
            <small>Projekt demonstracyjny — wygląd premium</small>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
